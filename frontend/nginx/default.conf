server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # API proxy: requests to /api/* are forwarded to backend service
  # Backend host and port are configurable via BACKEND_HOST and BACKEND_PORT env vars (defaults: backend:8080)
  # This way frontend talks to backend through internal Service DNS,
  # and browser sees localhost (same origin = no CORS issues).
  location /api/ {
    proxy_pass http://${BACKEND_HOST}:${BACKEND_PORT}/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback for all other routes
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Don't cache the runtime config so changes take effect immediately
  location = /env.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    try_files $uri =404;
  }
}
